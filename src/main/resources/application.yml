server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: account-system

  profiles:
    active: sqlite

  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:account_system.db
    username:
    password:
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1

  # Redis - 默认禁用
  data:
    redis:
      enabled: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # 禁用 Redis 健康检查
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# JWT 配置
jwt:
  secret: account-system-secret-key-must-be-at-least-32-characters-long-for-hs512
  expiration: 7200 # Token 有效期 (秒),默认 2 小时
  refresh-expiration: 604800 # Refresh Token 有效期 (秒),默认 7 天

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.xx.account.*.domain
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j/Swagger 配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn
  swagger-model-name: 实体类列表

# 日志配置
logging:
  level:
    root: info
    com.xx.account: debug
    org.springframework.security: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# 密码策略
password:
  min-length: 8
  require-uppercase: true
  require-lowercase: true
  require-digit: true
  require-special: false
  expire-days: 90
  history-count: 5

# 安全配置
security:
  login:
    max-retry: 5 # 最大登录失败次数
    lock-minutes: 30 # 锁定时间 (分钟)
  captcha:
    enabled: false # 禁用验证码
    expire-seconds: 300 # 验证码过期时间 (秒)